  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   command: ["--model", "mistralai/Mistral-7B-Instruct-v0.3"]

volumes:
  chroma_data:
